name: Lint & Test
on:
  schedule:
    - cron: "0 0 * * *"
  pull_request:
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: 8.4      
      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Run PHP Lint
        run: composer phpcs
  wporg-validation:
    name: WP.org Plugin Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create build directory
        run: |
          mkdir -p build/pantheon-hud
          rsync -av --exclude-from=.distignore ./ build/pantheon-hud/
      - uses: wordpress/plugin-check-action@98a1788320d0add90df2d8183934ecccbc4e05d2 # v1.1.7
        with:
          build-dir: './build/pantheon-hud'
  validate-readme-spacing:
    name: Validate README Spacing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pantheon-systems/validate-readme-spacing@229ea162621009cf8e09bf2beba405017150130e # v1.0.5
  php8-compatibility:
    name: PHP 8.x Compatibility
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: PHP Compatibility
        uses: pantheon-systems/phpcompatibility-action@bd72eb001d4fb9817c9d6e1a157a71e287f3ff80 # dev 2023-10-04T16:54:18Z
        with:
          test-versions: 8.0-
          paths: ${{ github.workspace }}/*.php ${{ github.workspace }}/inc/*.php
  test-phpunit:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['7.4', '8.4', '8.5']
    services:
      mariadb:
        image: ${{ matrix.php-version == '7.4' && 'mariadb:10.5' || 'mariadb:10.6' }}
    name: PHP ${{ matrix.php-version }} Unit Tests
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mysqli, zip, imagick
      - name: Start MySQL Service
        run: sudo systemctl start mysql
      - name: Cache dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/vendor
          key: test-phpunit-dependencies-${{ hashFiles('composer.json') }}-${{ matrix.php-version }}
          restore-keys: test-phpunit-dependencies-${{ hashFiles('composer.json') }}-${{ matrix.php-version }}
      - name: Setup WP-CLI
        uses: godaddy-wordpress/setup-wp-cli@80c9a89bd347082429795c0f12acf567e2c390d4 # 1 2022-10-04T19:52:20Z
      - name: Install Composer dependencies
        run: |
          if [ "${{ matrix.php-version }}" = "7.4" ]; then
            composer require pantheon-systems/pantheon-wp-coding-standards:^2.0 --dev --no-update
            composer update
          fi
          composer install
          chmod +x bin/*.sh
      - name: Run PHP linting
        run: composer phplint
      - name: Reset MariaDB root password to empty
        run: |
          until mysqladmin ping -h127.0.0.1 -uroot -proot --silent; do
            sleep 1
          done
          mysql -h127.0.0.1 -uroot -proot <<'SQL'
            ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY '';
            FLUSH PRIVILEGES;
          SQL
          mysqladmin ping -h127.0.0.1 -uroot --silent
      - name: Install WPUnit tests
        run: composer test:install:withdb
      - name: Run PHPUnit
        run: composer phpunit
