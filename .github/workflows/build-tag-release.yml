name: Build, Tag and Release
on:
  push:
    branches:
      - 'release'

permissions:
  pull-requests: write
  contents: write

jobs:
  tag:
    name: Tag and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build, tag and release
        uses: pantheon-systems/plugin-release-actions/build-tag-release@c4a1a8aac520bf6682efee843cd0f8fda8442793 # main 2025-11-07T23:23:14Z
        with:
          gh_token: ${{ github.token }}
          generate_release_notes: "true"
          draft: "true"
